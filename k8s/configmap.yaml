apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>GitOps Demo</title>
      <style>
        body {
          background-color: #27ae60;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          margin: 0;
          font-family: Arial, sans-serif;
        }
        .card {
          background: white;
          padding: 40px 60px;
          border-radius: 16px;
          text-align: center;
          box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        h1 { color: #3498db; font-size: 3em; }
        p { color: #555; font-size: 1.2em; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>🚀 Version 2</h1>
        <p>Deployed via GitOps + ArgoCD</p>
        <p>Background: <strong>Green</strong></p>
      </div>
    </body>
    </html>
