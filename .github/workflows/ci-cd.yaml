name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'

env:
  IMAGE_NAME: ashenellawala/gitops-demo-app
permissions:
  contents: write



jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set build number
        id: vars
        run: echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.run_number }}

      - name: Update deployment.yaml with new image tag
        run: |
          sed -i "s|image: ${{ env.IMAGE_NAME }}:.*|image: ${{ env.IMAGE_NAME }}:${{ github.run_number }}|g" k8s/deployment.yaml
          sed -i "s|value: \"[0-9]*\"  # BUILD|value: \"${{ github.run_number }}\"  # BUILD|g" k8s/deployment.yaml

      -- name: Commit and push manifest change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --cached --quiet && exit 0
          git commit -m "ci: update image to build ${{ github.run_number }}"
          git pull --rebase origin main            
          git push origin main